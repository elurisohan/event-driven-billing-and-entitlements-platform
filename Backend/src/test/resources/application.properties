# Test profile - use H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Kafka auto-config for tests (no broker needed)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# JWT secret for tests
jwt.secret=test-secret-key-for-unit-tests-only-minimum-256-bits-required

# Stripe placeholders for tests
stripe.api.key=sk_test_placeholder
gateflow.plans.free.price-id=price_test_free
gateflow.plans.pro.price-id=price_test_pro
